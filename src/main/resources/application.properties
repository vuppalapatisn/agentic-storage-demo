spring.application.name=agentic-storage-demo

# H2 in-memory database (simulates agentic storage backend)
spring.datasource.url=jdbc:h2:mem:agenticstorage;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (useful during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
